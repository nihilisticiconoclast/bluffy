name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The engine + agents run on Node's native TypeScript stripping — no build,
      # no install (there are no dependencies). Just run the suite.
      - name: Run tests
        run: npm test
      - name: Offline spike (smoke)
        run: npm run spike 1
