name: Live game

# Plays one real game with LLM players via OpenRouter, using the repository
# secret OPENROUTER_API_KEY. If the DATABASE_URL secret is set, the finished
# game is persisted to Neon and the leaderboard is printed (M3).
#
# Triggers:
#   • manual dispatch — runs always; pass seed=probe to run the read-only slug
#     probe (src/probe.ts) instead of playing a game.
#   • schedule (3×/day) — accumulates leaderboard data. Skips early while
#     DATABASE_URL is unset, so no quota is spent on games that wouldn't be
#     recorded. (GitHub only fires cron from the default branch.)
on:
  workflow_dispatch:
    inputs:
      seed:
        description: "Game seed (blank = random; 'probe' = verify model slugs instead of playing)"
        required: false
        default: ""
  schedule:
    - cron: "17 9,15,21 * * *"

jobs:
  play:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies (Neon driver for persistence)
        run: npm install
      - name: Verify model slugs (probe)
        if: ${{ github.event.inputs.seed == 'probe' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node src/probe.ts
      - name: Play a live game
        if: ${{ github.event.inputs.seed != 'probe' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ -z "$DATABASE_URL" ]; then
            echo "Scheduled game skipped: DATABASE_URL is not set, so the game would not be recorded."
            echo "Add the secret (and apply store/schema.sql to Neon) to start accumulating games."
            exit 0
          fi
          node src/live.ts ${{ github.event.inputs.seed }}
